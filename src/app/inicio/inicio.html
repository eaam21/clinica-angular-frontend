<div class="container">
    <br>
    <div class="row">
      <div class="col-9"></div>
      <div class="col-3">
        Bienvenido(a)
      </div>
    </div>
    <div class="row align-items-center mb-4 row-custom">
      <div class="col-8">
        <h2 class="fw-bold">Listado de Pacientes</h2>
      </div>
      <div class="col-4 text-end">
          <button routerLink="/salir" class="btn btn-danger">
            Salir de sesión
          </button>
      </div>
    </div>
    <div class="table-responsive">
        <div class="mat-elevation-z8" >
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" #tabla1>
                <ng-container matColumnDef="id">
                  <th mat-header-cell *matHeaderCellDef> Id </th>
                  <td mat-cell *matCellDef="let element"> {{element.id}} </td>
                </ng-container>
              
                <ng-container matColumnDef="apellidoPaterno">
                  <th mat-header-cell *matHeaderCellDef> Apellido Paterno </th>
                  <td mat-cell *matCellDef="let element"> {{element.apellidoPaterno}} </td>
                </ng-container>
              
                <ng-container matColumnDef="apellidoMaterno">
                  <th mat-header-cell *matHeaderCellDef> Apellido Materno </th>
                  <td mat-cell *matCellDef="let element"> {{element.apellidoMaterno}} </td>
                </ng-container>
              
                <ng-container matColumnDef="nombres">
                  <th mat-header-cell *matHeaderCellDef> Nombres </th>
                  <td mat-cell *matCellDef="let element"> {{element.nombres}} </td>
                </ng-container>
              
                <ng-container matColumnDef="dni">
                  <th mat-header-cell *matHeaderCellDef> DNI </th>
                  <td mat-cell *matCellDef="let element"> {{element.dni}} </td>
                </ng-container>
        
                  <ng-container matColumnDef="imc">
                    <th mat-header-cell *matHeaderCellDef> IMC </th>
                    <td mat-cell *matCellDef="let element"> {{element.imc}} </td>
                  </ng-container>
        

                  <tr class="mat-row" *matNoDataRow>
                      <td class="mat-cell" colspan="9999" style="text-align: center">
                          No se encontraron coincidencias.
                      </td>
                  </tr>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
            <mat-paginator [pageSizeOptions]="[5, 10, 15]" showFirstLastButtons></mat-paginator>
          </div>
    </div>
  </div>
