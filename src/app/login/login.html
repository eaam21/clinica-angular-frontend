<div class="login-container">
    <mat-card>
      <img src="assets/img/login2.jpg" width="350"/>
      <mat-card-title style="margin: 20px auto 20px auto; color: #404040;" class="fw-bold">Iniciar Sesión</mat-card-title>
      <mat-card-content>
        <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
          <mat-form-field class="full-width">
            <mat-label>Usuario</mat-label>
            <mat-icon matPrefix>person</mat-icon>
            <input matInput [(ngModel)]="credenciales.nombreUsuario" name="nombreUsuario" required />
          </mat-form-field>
          <mat-form-field class="full-width">
            <mat-label>Clave</mat-label>
            <mat-icon matPrefix>key</mat-icon>
            <input matInput type="password" [(ngModel)]="credenciales.claveUsuario" name="claveUsuario" required />
          </mat-form-field>
          <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">Ingresar</button>
        </form>
      </mat-card-content>
    </mat-card>
</div>
